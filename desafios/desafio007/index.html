<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagem Flexível</title>
</head>
<body>
    <h1>Imagem Flexível</h1>
    <p>Você está vendo uma imagem completa? Experimente ampliar o tamanho da janela para aproveiar a melhor experiência.</p>
    
    <picture>
        <source media="(max-width: 720px)" srcset="imagens/capa300.jpg" type="image/jpg">
        <source media="(max-width: 1020px)" srcset="imagens/capa700.jpg" type="image/jpg">
        <img src="imagens/capa1000.jpg" alt="Imagem flexível">
    </picture>
</body>
</html>
