<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudos de Iframe</title>
</head>
<body>
    <h1>Testando o uso de um iframe</h1>
    <p>
        Acessando o site do

        <!-- Um iframe tem tamanho padrão de 300x150px -->
        <iframe src="https://cursoemvideo.com" frameborder="0">
            <a href="https://cursoemvideo.com" target="_blank">CursoemVideo</a>
        </iframe>
        
        para aprender a programar
    </p>
    <p>O site do <iframe src="https://www.google.com.br" frameborder="0">
    </iframe> Google não funciona</p> <!-- Alguns sites não podem seer colocados em iframes, como por exmeplo ,o do google -->

    <p>
        O repositório do Guanabara
        
        <iframe src="https://gustavoguanabara.github.io" frameborder="0">
            <a href="https://gustavoguanabara.github.io" target="_blank">Repositório Guanabara</a> <!-- Caso o navegador não seja compatível com o iframe, o site mostrará o que está escrito acima, ou seja, o link-->
        </iframe>
    </p>
</body>
</html>
